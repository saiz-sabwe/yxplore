    ########################### Caddy (Reverse Proxy) ############################
  caddy:
    image: caddy:latest
    container_name: caddy_reverse_proxy_yxplore
    restart: unless-stopped
    ports:
      - "443:443"  # HTTPS
      - "80:80"    # HTTP
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - yxplore_network
    depends_on:
      django:
        condition: service_started
