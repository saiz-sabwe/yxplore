networks:
  yxplore_network:

services:
  ############################# Django App ##############################
  django:
    build: .
    container_name: yxplore_app
    image: yxplore:latest
    command: python3 manage.py runserver  0.0.0.0:8000 --insecure
    restart: always
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - .:/yxplore
      - ./docker/yxplore/ssl:/etc/ssl
    ports:
      - "8000:8000"
    networks:
      - yxplore_network

